name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: nix-community/cache-nix-action@v5
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1073741824
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Install dependencies
        run: nix develop --command deno install

      - name: Check formatting
        run: nix develop --command deno fmt --check

      - name: Lint
        run: nix develop --command deno lint

      - name: Type check
        run: nix develop --command deno task check

      - name: Test
        run: nix develop --command deno task test

      - name: Build docs
        run: nix develop --command deno task docs:build
