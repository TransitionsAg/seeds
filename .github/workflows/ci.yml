name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpx oxfmt --check .

      - name: Lint
        run: pnpx oxlint .

      - name: Type check
        run: pnpm run check

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Build docs
        run: pnpm run docs:build
